{% extends 'base.html' %}
{% block title %}删除耗材 - 驰达IT资产管理系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
<h4>删除耗材</h4>
</div>

<div class="card">
<div class="card-body">
<h5 class="text-danger">确定要删除耗材"{{ consumable.name }}"吗？</h5>
<p class="text-muted">此操作将同时删除该耗材的所有入库/领取记录，且无法恢复。</p>
<form method="post">
{% csrf_token %}
<button type="submit" class="btn btn-danger">确认删除</button>
<a href="{% url 'consumable_list' %}" class="btn btn-outline-secondary">取消</a>
</form>
</div>
</div>
{% endblock %}
