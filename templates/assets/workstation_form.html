{% extends 'base.html' %}
{% block title %}编辑工位 - 驰达IT资产管理系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="fas fa-edit"></i> 编辑工位 - {{ workstation.workstation_code }}</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">所属位置</label>
                    <input type="text" class="form-control" value="{{ workstation.location.get_full_path }}" readonly>
                    <small class="text-muted">工位位置不可修改，在地图编辑页面创建</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label">工位编号</label>
                    <input type="text" class="form-control" value="{{ workstation.workstation_code }}" readonly>
                    <small class="text-muted">工位编号不可修改</small>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">工位名称</label>
                    <input type="text" name="name" class="form-control" value="{{ workstation.name|default:'' }}" placeholder="可选，如：张三工位">
                </div>
                <div class="col-md-6">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        <option value="available" {% if workstation.status == 'available' %}selected{% endif %}>可用</option>
                        <option value="occupied" {% if workstation.status == 'occupied' %}selected{% endif %}>已占用</option>
                        <option value="maintenance" {% if workstation.status == 'maintenance' %}selected{% endif %}>维修中</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">X坐标</label>
                    <input type="number" name="x" class="form-control" value="{{ workstation.x|floatformat:0 }}" readonly>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Y坐标</label>
                    <input type="number" name="y" class="form-control" value="{{ workstation.y|floatformat:0 }}" readonly>
                </div>
                <div class="col-md-3">
                    <label class="form-label">宽度</label>
                    <input type="number" name="width" class="form-control" value="{{ workstation.width|floatformat:0 }}" readonly>
                </div>
                <div class="col-md-3">
                    <label class="form-label">高度</label>
                    <input type="number" name="height" class="form-control" value="{{ workstation.height|floatformat:0 }}" readonly>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">描述</label>
                    <textarea name="description" class="form-control" rows="2">{{ workstation.description|default:'' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>保存</button>
                <a href="{% url 'workstation_list' workstation.location.id %}" class="btn btn-outline-secondary ms-2">返回</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
